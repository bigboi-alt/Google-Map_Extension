<!DOCTYPE html>
<html>
<head>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="glow-orb"></div>

  <div class="top-bar">
    <div class="logo">
      <div class="logo-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/>
          <line x1="8" y1="2" x2="8" y2="18"/>
          <line x1="16" y1="6" x2="16" y2="22"/>
        </svg>
      </div>
      <span class="logo-text">MapFilter</span>
    </div>
    <span class="logo-badge">PRO</span>
  </div>

  <div class="divider"></div>

  <p class="subtitle">Surface businesses without websites,<br>reviews, or phones — right on Maps.</p>

  <button class="btn" id="go">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    Open Scanner Panel
  </button>

  <p class="hint">Works on <span>google.com/maps</span> only.<br>Click icon anytime to toggle panel.</p>

  <script src="popup.js"></script>
</body>
</html>
